<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Dr. Doaa Saif El-Dine</title>

    <!-- نفس الخطوط والتصميم -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
      /* نفس متغيرات الألوان */

      :root {
        --primary-deep-blue: #0a1929;
        --primary-burgundy: #8b1538;
        --secondary-gold: #c9a961;
        --gold-light: #e5d5b0;
        --cream-pure: #fffdf9;
        --cream-soft: #faf7f2;
        --gray-charcoal: #1e2a3a;
        --gray-warm: #4a4a4a;
        --shadow-elegant: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
        --border-subtle: rgba(201, 169, 97, 0.2);
        --gradient-dark: linear-gradient(145deg, #0a1929, #0e1e2f);
        --border-radius-card: 24px;
        --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: var(--cream-soft);
        color: var(--gray-warm);
        line-height: 1.8;
      }

      .admin-container {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 2rem;
      }
      /* Header */

      .admin-header {
        background: var(--gradient-dark);
        color: white;
        padding: 3rem 2rem;
        border-radius: var(--border-radius-card);
        text-align: center;
        margin-bottom: 3rem;
      }

      .admin-header h1 {
        font-size: 3rem;
        font-family: "Cormorant Garamond", serif;
        margin-bottom: 0.5rem;
      }
      /* Tabs التنقل */

      .admin-tabs {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        background: white;
        padding: 1rem;
        border-radius: 50px;
        box-shadow: var(--shadow-elegant);
      }

      .tab-btn {
        padding: 0.8rem 2rem;
        border: none;
        background: transparent;
        border-radius: 40px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition-smooth);
        color: var(--gray-warm);
        flex: 1;
        font-size: 1rem;
      }

      .tab-btn.active {
        background: var(--primary-burgundy);
        color: white;
      }

      .tab-btn:hover:not(.active) {
        background: var(--cream-soft);
        color: var(--primary-deep-blue);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }
      /* بطاقات التحكم */

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 2rem;
        margin-bottom: 3rem;
      }

      .stat-card {
        background: white;
        padding: 2rem;
        border-radius: var(--border-radius-card);
        box-shadow: var(--shadow-elegant);
        text-align: center;
        border: 1px solid var(--border-subtle);
      }

      .stat-card i {
        font-size: 2.5rem;
        color: var(--secondary-gold);
        margin-bottom: 1rem;
      }

      .stat-card h3 {
        font-size: 2rem;
        color: var(--primary-deep-blue);
        margin-bottom: 0.5rem;
      }
      /* قسم المواسم */

      .seasons-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
      }

      .season-card {
        background: white;
        border-radius: var(--border-radius-card);
        overflow: hidden;
        box-shadow: var(--shadow-elegant);
        border: 1px solid var(--border-subtle);
        transition: var(--transition-smooth);
      }

      .season-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-deep);
      }

      .season-header {
        background: linear-gradient(
          135deg,
          var(--primary-deep-blue),
          var(--primary-burgundy)
        );
        color: white;
        padding: 1.5rem;
        position: relative;
      }

      .season-header h3 {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
      }

      .season-header .season-id {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: var(--secondary-gold);
        color: var(--primary-deep-blue);
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .season-body {
        padding: 1.5rem;
      }

      .season-body p {
        margin-bottom: 0.5rem;
        color: var(--gray-warm);
      }

      .season-body .badge {
        display: inline-block;
        background: var(--cream-soft);
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.9rem;
        color: var(--primary-burgundy);
        margin-top: 0.5rem;
      }

      .season-actions {
        display: flex;
        gap: 0.5rem;
        padding: 1rem 1.5rem 1.5rem;
        border-top: 1px solid var(--border-subtle);
      }
      /* اختيار الموسم للفيديوهات */

      .season-selector {
        background: white;
        padding: 2rem;
        border-radius: var(--border-radius-card);
        margin-bottom: 2rem;
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .season-selector select {
        padding: 0.8rem 1.5rem;
        border: 2px solid var(--border-subtle);
        border-radius: 50px;
        font-size: 1rem;
        flex: 1;
        min-width: 200px;
      }

      .btn-primary {
        background: var(--primary-burgundy);
        color: white;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        transition: var(--transition-smooth);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-primary:hover {
        background: var(--secondary-gold);
        transform: translateY(-3px);
      }

      .btn-success {
        background: #28a745;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .btn-success:hover {
        background: #218838;
      }

      .btn-warning {
        background: #ffc107;
        color: var(--primary-deep-blue);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .btn-warning:hover {
        background: #e0a800;
      }

      .btn-danger {
        background: #dc3545;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .btn-danger:hover {
        background: #c82333;
      }

      .btn-secondary {
        background: var(--gray-warm);
        color: white;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        cursor: pointer;
      }

      .btn-secondary:hover {
        background: #5a5a5a;
      }
      /* جدول الفيديوهات */

      .videos-table {
        background: white;
        border-radius: var(--border-radius-card);
        overflow: hidden;
        box-shadow: var(--shadow-elegant);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: var(--primary-deep-blue);
        color: white;
        padding: 1rem;
        text-align: center;
        font-weight: 500;
      }

      td {
        padding: 1rem;
        border-bottom: 1px solid var(--border-subtle);
        text-align: center;
      }

      tr:hover {
        background: var(--cream-soft);
      }

      .action-buttons {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
      }

      .btn-edit,
      .btn-delete {
        padding: 0.5rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-smooth);
        width: 35px;
        height: 35px;
      }

      .btn-edit {
        background: var(--secondary-gold);
        color: var(--primary-deep-blue);
      }

      .btn-delete {
        background: var(--primary-burgundy);
        color: white;
      }

      .btn-edit:hover,
      .btn-delete:hover {
        transform: scale(1.1);
      }
      /* Modal */

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        z-index: 1000;
      }

      .modal-content {
        background: white;
        width: 90%;
        max-width: 500px;
        margin: 2rem auto;
        padding: 2rem;
        border-radius: var(--border-radius-card);
        animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--primary-deep-blue);
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 0.8rem;
        border: 2px solid var(--border-subtle);
        border-radius: 12px;
        font-size: 1rem;
      }

      .form-actions {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
        margin-top: 2rem;
      }

      .login-container {
        max-width: 400px;
        margin: 5rem auto;
        background: white;
        padding: 3rem;
        border-radius: var(--border-radius-card);
        box-shadow: var(--shadow-elegant);
        text-align: center;
      }

      .login-container h2 {
        margin-bottom: 2rem;
        color: var(--primary-deep-blue);
      }

      .login-container input {
        width: 100%;
        padding: 1rem;
        margin-bottom: 1rem;
        border: 2px solid var(--border-subtle);
        border-radius: 12px;
      }

      #adminContent {
        display: none;
      }

      .back-link {
        margin-bottom: 2rem;
      }

      .back-link a {
        color: var(--primary-deep-blue);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 500;
      }

      .back-link a:hover {
        color: var(--secondary-gold);
      }

      .search-box {
        padding: 0.8rem;
        border: 2px solid var(--border-subtle);
        border-radius: 50px;
        flex: 1;
        min-width: 200px;
      }

      @media (max-width: 768px) {
        .admin-tabs {
          flex-direction: column;
          border-radius: 24px;
        }
        .season-selector {
          flex-direction: column;
        }
        .season-selector select,
        .season-selector .btn-primary {
          width: 100%;
        }
        .admin-container {
          padding: 0 1rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- شاشة تسجيل الدخول -->
    <div id="loginContainer" class="login-container">
      <h2>Admin Login</h2>
      <input type="password" id="adminPassword" placeholder="Enter Password" />
      <button class="btn-primary" onclick="checkPassword()" style="width: 100%">
        Login
      </button>
    </div>

    <!-- محتوى الإدارة (يظهر بعد تسجيل الدخول) -->
    <div id="adminContent">
      <div class="admin-container">
        <div class="back-link">
          <a href="index.html"
            ><i class="fas fa-arrow-left"></i> Back to Main Page</a
          >
        </div>

        <div class="admin-header">
          <h1>Admin Dashboard</h1>
          <p>Manage your video library and seasons</p>
        </div>

        <!-- Tabs التنقل -->
        <div class="admin-tabs">
          <button
            class="tab-btn active"
            onclick="switchTab('videos')"
            id="tabVideosBtn"
          >
            <i class="fas fa-video"></i> Videos
          </button>
          <button
            class="tab-btn"
            onclick="switchTab('seasons')"
            id="tabSeasonsBtn"
          >
            <i class="fas fa-layer-group"></i> Seasons
          </button>
          <button class="tab-btn" onclick="switchTab('stats')" id="tabStatsBtn">
            <i class="fas fa-chart-bar"></i> Statistics
          </button>
        </div>

        <!-- Tab: Videos -->
        <div id="tabVideos" class="tab-content active">
          <!-- اختيار الموسم -->
          <div class="season-selector">
            <select id="seasonSelect" onchange="loadVideos()">
              <option value="1">Season 1</option>
              <option value="2">Season 2</option>
              <option value="3">Season 3</option>
            </select>
            <input
              type="text"
              id="searchInput"
              class="search-box"
              placeholder="Search videos..."
              onkeyup="filterVideos()"
            />
            <button class="btn-primary" onclick="openAddVideoModal()">
              <i class="fas fa-plus"></i> Add New Video
            </button>
          </div>

          <!-- جدول الفيديوهات -->
          <div class="videos-table">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Title</th>
                  <th>YouTube ID</th>
                  <th>Duration</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="videosTableBody">
                <tr>
                  <td colspan="5" style="text-align: center; padding: 2rem">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Tab: Seasons -->
        <div id="tabSeasons" class="tab-content">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 2rem;
            "
          >
            <h2 style="font-size: 2rem; color: var(--primary-deep-blue)">
              Manage Seasons
            </h2>
            <button class="btn-primary" onclick="openAddSeasonModal()">
              <i class="fas fa-plus"></i> Add New Season
            </button>
          </div>

          <div id="seasonsContainer" class="seasons-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem">
              <i class="fas fa-spinner fa-spin"></i> Loading seasons...
            </div>
          </div>
        </div>

        <!-- Tab: Statistics -->
        <div id="tabStats" class="tab-content">
          <div class="stats-grid" id="statsContainer">
            <div class="stat-card">
              <i class="fas fa-spinner fa-spin"></i>
              <h3>Loading...</h3>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal إضافة/تعديل فيديو -->
    <div id="videoModal" class="modal">
      <div class="modal-content">
        <h2 id="videoModalTitle">Add New Video</h2>
        <form id="videoForm" onsubmit="saveVideo(event)">
          <div class="form-group">
            <label>Video Number</label>
            <input type="number" id="videoNumber" required />
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="videoTitle" required />
          </div>
          <div class="form-group">
            <label>YouTube ID</label>
            <input
              type="text"
              id="videoYoutubeId"
              required
              placeholder="e.g., BQqMKXTpO6g"
            />
          </div>
          <div class="form-group">
            <label>Duration</label>
            <input
              type="text"
              id="videoDuration"
              required
              placeholder="e.g., 27:58"
            />
          </div>
          <div class="form-actions">
            <button
              type="button"
              class="btn-secondary"
              onclick="closeModal('videoModal')"
            >
              Cancel
            </button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal إضافة/تعديل موسم -->
    <div id="seasonModal" class="modal">
      <div class="modal-content">
        <h2 id="seasonModalTitle">Add New Season</h2>
        <form id="seasonForm" onsubmit="saveSeason(event)">
          <div class="form-group">
            <label>Season Title</label>
            <input
              type="text"
              id="seasonTitle"
              required
              placeholder="e.g., Season 4"
            />
          </div>
          <div class="form-group">
            <label>Subtitle</label>
            <input
              type="text"
              id="seasonSubtitle"
              required
              placeholder="e.g., Advanced Topics"
            />
          </div>
          <div class="form-group">
            <label>Badge</label>
            <input
              type="text"
              id="seasonBadge"
              required
              placeholder="e.g., Season 4"
            />
          </div>
          <div class="form-actions">
            <button
              type="button"
              class="btn-secondary"
              onclick="closeModal('seasonModal')"
            >
              Cancel
            </button>
            <button type="submit" class="btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();

      // ============ Configuration ============
      const API_URL = window.location.hostname === 'localhost' ? '' : ; // استبدل برابط Render بعد الرفع

      // ============ Tab Switching ============
      function switchTab(tabName) {
        // إخفاء كل التبويبات
        document.getElementById("tabVideos").classList.remove("active");
        document.getElementById("tabSeasons").classList.remove("active");
        document.getElementById("tabStats").classList.remove("active");

        // إزالة active من كل الأزرار
        document.getElementById("tabVideosBtn").classList.remove("active");
        document.getElementById("tabSeasonsBtn").classList.remove("active");
        document.getElementById("tabStatsBtn").classList.remove("active");

        // إظهار التبويب المختار
        document
          .getElementById(
            `tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`,
          )
          .classList.add("active");
        document
          .getElementById(
            `tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}Btn`,
          )
          .classList.add("active");

        // تحميل البيانات حسب التبويب
        if (tabName === "seasons") {
          loadSeasons();
        } else if (tabName === "stats") {
          loadStats();
        } else if (tabName === "videos") {
          loadVideos();
        }
      }

      // ============ Login ============
      async function checkPassword() {
        const password = document.getElementById("adminPassword").value;

        try {
          const response = await fetch(`${API_URL}/api/check-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              password,
            }),
          });

          const data = await response.json();

          if (data.success) {
            document.getElementById("loginContainer").style.display = "none";
            document.getElementById("adminContent").style.display = "block";
            loadStats();
            loadVideos();
            loadSeasons();
          } else {
            alert("Wrong password!");
          }
        } catch (error) {
          console.error("Login error:", error);
          alert("Error connecting to server");
        }
      }

      // ============ Video Management ============
      let currentSeason = 1;
      let editingVideoId = null;
      let allVideos = [];

      async function loadVideos() {
        currentSeason = document.getElementById("seasonSelect").value;

        try {
          const response = await fetch(
            `${API_URL}/api/seasons/${currentSeason}/videos`,
          );
          allVideos = await response.json();
          displayVideos(allVideos);
        } catch (error) {
          console.error("Error loading videos:", error);
          document.getElementById("videosTableBody").innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 2rem; color: #cc0000;">
                            <i class="fas fa-exclamation-triangle"></i> Error loading videos
                        </td>
                    </tr>
                `;
        }
      }

      function displayVideos(videos) {
        const tbody = document.getElementById("videosTableBody");
        tbody.innerHTML = "";

        if (videos.length === 0) {
          tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 2rem;">No videos in this season</td>
                    </tr>
                `;
        } else {
          videos.forEach((video) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                        <td>${video.number}</td>
                        <td>${video.title}</td>
                        <td>${video.youtubeId}</td>
                        <td>${video.duration}</td>
                        <td class="action-buttons">
                            <button class="btn-edit" onclick='editVideo("${video._id}", "${video.title}", "${video.youtubeId}", "${video.duration}", ${video.number})'>
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-delete" onclick='deleteVideo("${video._id}")'>
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
            tbody.appendChild(row);
          });
        }
      }

      function filterVideos() {
        const searchTerm = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filtered = allVideos.filter(
          (video) =>
            video.title.toLowerCase().includes(searchTerm) ||
            video.youtubeId.toLowerCase().includes(searchTerm),
        );
        displayVideos(filtered);
      }

      function openAddVideoModal() {
        editingVideoId = null;
        document.getElementById("videoModalTitle").textContent =
          "Add New Video";
        document.getElementById("videoNumber").value = "";
        document.getElementById("videoTitle").value = "";
        document.getElementById("videoYoutubeId").value = "";
        document.getElementById("videoDuration").value = "";
        document.getElementById("videoModal").style.display = "block";
      }

      function editVideo(id, title, youtubeId, duration, number) {
        editingVideoId = id;
        document.getElementById("videoModalTitle").textContent = "Edit Video";
        document.getElementById("videoNumber").value = number;
        document.getElementById("videoTitle").value = title;
        document.getElementById("videoYoutubeId").value = youtubeId;
        document.getElementById("videoDuration").value = duration;
        document.getElementById("videoModal").style.display = "block";
      }

      async function saveVideo(event) {
        event.preventDefault();

        const videoData = {
          seasonId: parseInt(currentSeason),
          number: parseInt(document.getElementById("videoNumber").value),
          title: document.getElementById("videoTitle").value,
          youtubeId: document.getElementById("videoYoutubeId").value,
          duration: document.getElementById("videoDuration").value,
        };

        try {
          let response;
          if (editingVideoId) {
            response = await fetch(`${API_URL}/api/videos/${editingVideoId}`, {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(videoData),
            });
          } else {
            response = await fetch(`${API_URL}/api/videos`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(videoData),
            });
          }

          if (response.ok) {
            closeModal("videoModal");
            loadVideos();
            loadStats();
            alert("Video saved successfully!");
          } else {
            alert("Error saving video");
          }
        } catch (error) {
          console.error("Error:", error);
          alert("Error saving video");
        }
      }

      async function deleteVideo(id) {
        if (confirm("Are you sure you want to delete this video?")) {
          try {
            const response = await fetch(`${API_URL}/api/videos/${id}`, {
              method: "DELETE",
            });

            if (response.ok) {
              loadVideos();
              loadStats();
              alert("Video deleted successfully!");
            } else {
              alert("Error deleting video");
            }
          } catch (error) {
            console.error("Error:", error);
            alert("Error deleting video");
          }
        }
      }

      // ============ Season Management ============
      let editingSeasonId = null;

      async function loadSeasons() {
        try {
          const response = await fetch(`${API_URL}/api/seasons`);
          const seasons = await response.json();
          displaySeasons(seasons);

          // تحديث قائمة المواسم في select
          const select = document.getElementById("seasonSelect");
          select.innerHTML = "";
          seasons.forEach((season) => {
            const option = document.createElement("option");
            option.value = season.seasonId;
            option.textContent = season.title;
            select.appendChild(option);
          });
        } catch (error) {
          console.error("Error loading seasons:", error);
          document.getElementById("seasonsContainer").innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #cc0000;">
                        <i class="fas fa-exclamation-triangle"></i> Error loading seasons
                    </div>
                `;
        }
      }

      function displaySeasons(seasons) {
        const container = document.getElementById("seasonsContainer");
        container.innerHTML = "";

        seasons.forEach((season) => {
          const card = document.createElement("div");
          card.className = "season-card";

          // تحديد إذا كان الموسم أساسي (1,2,3) لا يمكن حذفه
          const isDefault = season.seasonId <= 3;

          card.innerHTML = `
                    <div class="season-header">
                        <h3>${season.title}</h3>
                        <div class="season-id">ID: ${season.seasonId}</div>
                    </div>
                    <div class="season-body">
                        <p><strong>Subtitle:</strong> ${season.subtitle}</p>
                        <p><strong>Badge:</strong> <span class="badge">${season.badge}</span></p>
                    </div>
                    <div class="season-actions">
                        <button class="btn-warning" onclick='editSeason(${season.seasonId}, "${season.title}", "${season.subtitle}", "${season.badge}")' style="flex:1;">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        ${
                          !isDefault
                            ? `
                        <button class="btn-danger" onclick='deleteSeason(${season.seasonId})' style="flex:1;">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        `
                            : `
                        <button class="btn-secondary" disabled style="flex:1; opacity:0.5;">
                            <i class="fas fa-lock"></i> Default
                        </button>
                        `
                        }
                    </div>
                `;
          container.appendChild(card);
        });
      }

      function openAddSeasonModal() {
        editingSeasonId = null;
        document.getElementById("seasonModalTitle").textContent =
          "Add New Season";
        document.getElementById("seasonTitle").value = "";
        document.getElementById("seasonSubtitle").value = "";
        document.getElementById("seasonBadge").value = "";
        document.getElementById("seasonModal").style.display = "block";
      }

      function editSeason(seasonId, title, subtitle, badge) {
        editingSeasonId = seasonId;
        document.getElementById("seasonModalTitle").textContent = "Edit Season";
        document.getElementById("seasonTitle").value = title;
        document.getElementById("seasonSubtitle").value = subtitle;
        document.getElementById("seasonBadge").value = badge;
        document.getElementById("seasonModal").style.display = "block";
      }

      async function saveSeason(event) {
        event.preventDefault();

        const seasonData = {
          title: document.getElementById("seasonTitle").value,
          subtitle: document.getElementById("seasonSubtitle").value,
          badge: document.getElementById("seasonBadge").value,
        };

        try {
          let response;
          if (editingSeasonId) {
            // تعديل موسم
            response = await fetch(
              `${API_URL}/api/seasons/${editingSeasonId}`,
              {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(seasonData),
              },
            );
          } else {
            // إضافة موسم جديد
            response = await fetch(`${API_URL}/api/seasons`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(seasonData),
            });
          }

          if (response.ok) {
            closeModal("seasonModal");
            loadSeasons();
            loadStats();
            alert(
              editingSeasonId
                ? "Season updated successfully!"
                : "Season added successfully!",
            );
          } else {
            const error = await response.json();
            alert(error.error || "Error saving season");
          }
        } catch (error) {
          console.error("Error:", error);
          alert("Error saving season");
        }
      }

      async function deleteSeason(seasonId) {
        if (
          confirm(
            "Are you sure you want to delete this season? (All videos in this season must be deleted first)",
          )
        ) {
          try {
            const response = await fetch(`${API_URL}/api/seasons/${seasonId}`, {
              method: "DELETE",
            });

            if (response.ok) {
              loadSeasons();
              loadStats();
              alert("Season deleted successfully!");
            } else {
              const error = await response.json();
              alert(error.error || "Error deleting season");
            }
          } catch (error) {
            console.error("Error:", error);
            alert("Error deleting season");
          }
        }
      }

      // ============ Statistics ============
      async function loadStats() {
        try {
          const response = await fetch(`${API_URL}/api/stats`);
          const stats = await response.json();

          const statsHtml = `
                    <div class="stat-card">
                        <i class="fas fa-video"></i>
                        <h3>${stats.totalVideos}</h3>
                        <p>Total Videos</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-layer-group"></i>
                        <h3>${stats.totalSeasons}</h3>
                        <p>Seasons</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <h3>${stats.totalHours}</h3>
                        <p>Total Hours</p>
                    </div>
                `;

          document.getElementById("statsContainer").innerHTML = statsHtml;
        } catch (error) {
          console.error("Error loading stats:", error);
        }
      }

      // ============ Modal Functions ============
      function closeModal(modalId) {
        document.getElementById(modalId).style.display = "none";
      }

      window.onclick = function (event) {
        const videoModal = document.getElementById("videoModal");
        const seasonModal = document.getElementById("seasonModal");
        if (event.target === videoModal) {
          closeModal("videoModal");
        }
        if (event.target === seasonModal) {
          closeModal("seasonModal");
        }
      };
    </script>
  </body>
</html>
